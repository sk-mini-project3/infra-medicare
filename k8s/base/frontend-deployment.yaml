apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-frontend
  labels:
    app: medical-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-frontend
  template:
    metadata:
      labels:
        app: medical-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-frontend
          image: ghcr.io/your-org/medical-service-frontend:latest
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: medical-service-config
                  key: NEXT_PUBLIC_API_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medical-service-config
                  key: NODE_ENV
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
