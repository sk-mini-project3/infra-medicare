apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-ai
  labels:
    app: medical-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-ai
  template:
    metadata:
      labels:
        app: medical-ai
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-ai
          image: ghcr.io/your-org/ai-medicare:latest
          envFrom:
            - configMapRef:
                name: medical-service-config
            - secretRef:
                name: medical-ai-secret
          ports:
            - containerPort: 8001
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
