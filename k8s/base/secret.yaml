apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
  labels:
    app: medical-service
type: Opaque
stringData:
  # 실제 값은 배포 시점에 별도로 주입해야 합니다.
  # 이 파일에는 재사용 가능한 비밀번호나 접속 문자열을 두지 않습니다.
  DB_USERNAME: "<DB_USERNAME>"
  DB_PASSWORD: "<DB_PASSWORD>"
  DATABASE_URL: "mysql://<DB_USERNAME>:<DB_PASSWORD>@<RDS_ENDPOINT>:3306/<DB_NAME>"
