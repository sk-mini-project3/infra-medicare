apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  labels:
    app: medical-service
type: Opaque
stringData:
  # 실제 값은 배포 시점에 별도로 주입해야 합니다.
  # 이 파일에는 재사용 가능한 비밀번호나 접속 문자열을 두지 않습니다.
  DB_USERNAME: "<DB_USERNAME>"
  DB_PASSWORD: "<DB_PASSWORD>"
  SPRING_DATASOURCE_URL: "jdbc:mysql://<RDS_ENDPOINT>:3306/<DB_NAME>?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
  REDIS_PASSWORD: "<REDIS_PASSWORD>"
  JWT_SECRET: "<JWT_SECRET>"
  ENCRYPTION_KEY: "<ENCRYPTION_KEY>"
