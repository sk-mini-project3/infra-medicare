apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-backend
  labels:
    app: medical-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-backend
  template:
    metadata:
      labels:
        app: medical-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: medical-backend
          image: ghcr.io/your-org/medical-service-backend:latest
          envFrom:
            - configMapRef:
                name: medical-service-config
            - secretRef:
                name: medical-backend-secret
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
