resources:
  - ../../base

namespace: medical-dev

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: medical-service-config
    literals:
      - NODE_ENV=development
      - SERVER_PORT=3000
      - APP_MAIL_DELIVERY=console
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - APP_FRONTEND_URL=http://localhost:8080
      - AI_BASE_URL=http://localhost:8001

secretGenerator:
  - name: medical-backend-secret
    literals:
      - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/medicalservicedb?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - DB_USERNAME=root
      - DB_PASSWORD=
      - REDIS_PASSWORD=
      - JWT_SECRET=dev-only-secret
      - ENCRYPTION_KEY=defaultkeyfordevonly1234567890ab
      - MAIL_USERNAME=
      - MAIL_PASSWORD=
      - APP_FRONTEND_URL=http://localhost:8080
      - APP_MAIL_DELIVERY=console
      - AI_BASE_URL=http://localhost:8001
  - name: medical-ai-secret
    literals:
      - DB_URL=
      - EMAIL_ADDRESS=
      - EMAIL_PASSWORD=
      - ADMIN_EMAIL=

images:
  - name: ghcr.io/your-org/medical-service-frontend
    newName: ghcr.io/your-org/medical-service-frontend
    newTag: local
  - name: ghcr.io/your-org/medical-service-backend
    newName: ghcr.io/your-org/medical-service-backend
    newTag: local
  - name: ghcr.io/your-org/ai-medicare
    newName: ghcr.io/your-org/ai-medicare
    newTag: local

replicas:
  - name: medical-frontend
    count: 1
  - name: medical-backend
    count: 1
  - name: medical-ai
    count: 1
