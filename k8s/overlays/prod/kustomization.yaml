namespace: medical-prod

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: medical-service-config
    literals:
      - NODE_ENV=production
      - SERVER_PORT=3000
      - APP_MAIL_DELIVERY=auto
      - REDIS_PORT=6379
      - NEXT_PUBLIC_API_URL=https://api.example.com
      - APP_FRONTEND_URL=https://app.example.com
      - AI_BASE_URL=https://ai.example.com

secretGenerator:
  - name: medical-backend-secret
    envs:
      - ../../../medical-backend.env
  - name: medical-ai-secret
    envs:
      - ../../../medical-ai.env

images:
  - name: ghcr.io/your-org/medical-service-frontend
    newName: ghcr.io/your-org/medical-service-frontend
    newTag: latest
  - name: ghcr.io/your-org/medical-service-backend
    newName: ghcr.io/your-org/medical-service-backend
    newTag: latest
  - name: ghcr.io/your-org/ai-medicare
    newName: ghcr.io/your-org/ai-medicare
    newTag: latest

replicas:
  - name: medical-frontend
    count: 2
  - name: medical-backend
    count: 2
  - name: medical-ai
    count: 2
